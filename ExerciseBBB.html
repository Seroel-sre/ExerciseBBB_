<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExerciseBBB</title>
    <style>
        :root {
            --bg-color: #0d0d0d; --container-bg: #161616; --panel-bg: #222222;
            --text-color: #f5f5f5; --accent-color: #ff7b00; --accent-hover: #e06c00; --border-color: #333;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; justify-content: center; }
        #login-section { max-width: 400px; width: 100%; margin-top: 10vh; }
        #app-section { max-width: 800px; width: 100%; display: none; }
        .box { background-color: var(--container-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        h1, h2, h4 { color: var(--accent-color); text-align: center; margin-bottom: 20px; }
        
        input { width: 100%; padding: 12px; margin: 5px 0 15px 0; background: #1a1a1a; border: 1px solid var(--border-color); color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: var(--accent-color); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 5px; transition: 0.2s; }
        button:hover { background: var(--accent-hover); }
        .btn-secondary { background: #333; margin-top: 10px; }
        
        .tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 20px; gap: 10px; }
        .tab-btn { flex: 1; background: transparent; color: #888; padding: 12px; border: none; cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: var(--accent-color); border-bottom: 3px solid var(--accent-color); }
        
        .sub-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .sub-btn { flex: 1; background: #222; color: #aaa; padding: 8px; border: 1px solid #333; cursor: pointer; border-radius: 6px; font-size: 13px; }
        .sub-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }

        .tab-content, .sub-content { display: none; }
        .tab-content.active, .sub-content.active { display: block; }
        
        .marco-seccion { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2a2a2a; }
        
        ul { list-style: none; padding: 0; }
        li { display: grid; grid-template-columns: 40px 1fr auto 40px; align-items: center; background: #161616; padding: 14px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #222; gap: 10px; }
        li.completado { opacity: 0.5; filter: grayscale(1); }
        .btn-borrar { background: none; color: #555; border: none; cursor: pointer; font-size: 20px; }
        .btn-borrar:hover { color: #ff4444; }
        .reps-text { color: var(--accent-color); font-weight: bold; font-size: 0.9em; min-width: 60px; text-align: right; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="box">
            <h1>ExerciseBBB</h1>
            <input type="text" id="username" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button onclick="iniciarSesion()">Entrar</button>
            <button class="btn-secondary" onclick="registrarUsuario()">Registrarse</button>
            <p id="login-msg" style="text-align:center; color:#ff4444; font-size: 14px;"></p>
        </div>
    </div>

    <div id="app-section">
        <div class="box">
            <h2 id="titulo-usuario">Tus Rutinas</h2>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(event, 'gym')">🏋️ Gimnasio</button>
                <button class="tab-btn" onclick="switchTab(event, 'basket')">🏀 Baloncesto</button>
            </div>

            <div id="gym" class="tab-content active">
                <div class="marco-seccion"><input type="text" id="ej-gym" placeholder="Nombre ejercicio"><input type="text" id="reps-gym" placeholder="Reps / Series"><button onclick="add('gym')">Añadir</button></div>
                <ul id="list-gym"></ul>
            </div>

            <div id="basket" class="tab-content">
                <div class="marco-seccion">
                    <h4>🔥 Calentamiento</h4>
                    <input type="text" id="ej-calentamiento" placeholder="Ejercicio">
                    <input type="text" id="reps-calentamiento" placeholder="Duración">
                    <button onclick="add('calentamiento')">Añadir</button>
                </div>
                <ul id="list-calentamiento"></ul>

                <div class="sub-tabs">
                    <button class="sub-btn active" onclick="switchSub(event, 'bote')">Bote</button>
                    <button class="sub-btn" onclick="switchSub(event, 'tiro')">Tiro</button>
                    <button class="sub-btn" onclick="switchSub(event, 'finalizacion')">Finalización</button>
                </div>
                <div id="bote" class="sub-content active">
                    <div class="marco-seccion"><input type="text" id="ej-bote" placeholder="Ejercicio Bote"><input type="text" id="reps-bote" placeholder="Reps"><button onclick="add('bote')">Añadir</button></div>
                    <ul id="list-bote"></ul>
                </div>
                <div id="tiro" class="sub-content">
                    <div class="marco-seccion"><input type="text" id="ej-tiro" placeholder="Ejercicio Tiro"><input type="text" id="reps-tiro" placeholder="Reps"><button onclick="add('tiro')">Añadir</button></div>
                    <ul id="list-tiro"></ul>
                </div>
                <div id="finalizacion" class="sub-content">
                    <div class="marco-seccion"><input type="text" id="ej-finalizacion" placeholder="Ejercicio Final"><input type="text" id="reps-finalizacion" placeholder="Reps"><button onclick="add('finalizacion')">Añadir</button></div>
                    <ul id="list-finalizacion"></ul>
                </div>
            </div>
            <button class="btn-secondary" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        let currentUser = "";
        function registrarUsuario() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(!user || !pass) return;
            if(localStorage.getItem(user)) return alert("Usuario ya existe");
            localStorage.setItem(user, pass);
            alert("Registrado");
        }
        function iniciarSesion() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(localStorage.getItem(user) === pass) {
                currentUser = user;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                document.getElementById('titulo-usuario').innerText = "Rutinas de " + user;
                render();
            } else { alert("Datos incorrectos"); }
        }
        function add(type) {
            const ej = document.getElementById('ej-'+type).value;
            const reps = document.getElementById('reps-'+type).value;
            if(!ej) return;
            let db = JSON.parse(localStorage.getItem(currentUser+'_data')) || { gym:[], calentamiento:[], bote:[], tiro:[], finalizacion:[] };
            db[type].push({ej, reps, done:false});
            localStorage.setItem(currentUser+'_data', JSON.stringify(db));
            document.getElementById('ej-'+type).value = '';
            document.getElementById('reps-'+type).value = '';
            render();
        }
        function toggle(type, i) {
            let db = JSON.parse(localStorage.getItem(currentUser+'_data'));
            db[type][i].done = !db[type][i].done;
            localStorage.setItem(currentUser+'_data', JSON.stringify(db));
            render();
        }
        function borrar(type, i) {
            let db = JSON.parse(localStorage.getItem(currentUser+'_data'));
            db[type].splice(i, 1);
            localStorage.setItem(currentUser+'_data', JSON.stringify(db));
            render();
        }
        function render() {
            let db = JSON.parse(localStorage.getItem(currentUser+'_data')) || { gym:[], calentamiento:[], bote:[], tiro:[], finalizacion:[] };
            for(let type in db) {
                const ul = document.getElementById('list-'+type);
                if(ul) ul.innerHTML = db[type].map((item, i) => `
                    <li class="${item.done?'completado':''}">
                        <input type="checkbox" ${item.done?'checked':''} onchange="toggle('${type}',${i})">
                        <span style="font-weight: 500;">${item.ej}</span>
                        <span class="reps-text">${item.reps}</span>
                        <button class="btn-borrar" onclick="borrar('${type}',${i})">×</button>
                    </li>`).join('');
            }
        }
        function switchTab(e, id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }
        function switchSub(e, id) {
            document.querySelectorAll('.sub-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }
        function cerrarSesion() { location.reload(); }
    </script>
</body>
</html>
